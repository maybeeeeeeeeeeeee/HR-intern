version: '3.8'

services:
  # ============================================================================
  # APPLICATION PRINCIPALE
  # ============================================================================
  app:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: hr_agent_app
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
      - DB_TYPE=sqlite
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      - redis
    networks:
      - hr_agent_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================================
  # REDIS (CACHE & RATE LIMITING)
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: hr_agent_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hr_agent_network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # NGINX (REVERSE PROXY)
  # ============================================================================
  nginx:
    image: nginx:alpine
    container_name: hr_agent_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ../frontend/index.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      - app
    networks:
      - hr_agent_network

  # ============================================================================
  # MONITORING - PROMETHEUS (OPTIONNEL)
  # ============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: hr_agent_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - hr_agent_network
    profiles:
      - monitoring

  # ============================================================================
  # MONITORING - GRAFANA (OPTIONNEL)
  # ============================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: hr_agent_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - hr_agent_network
    profiles:
      - monitoring

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  hr_agent_network:
    driver: bridge